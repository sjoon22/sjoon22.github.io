---
layout: default
---

<main class="main main--archive">
  <div class="container archive">
    <header class="archive-header">
      {% if page.title %}
        <h1 class="archive-title">{{ page.title }}</h1>
      {% endif %}
      {% if page.description %}
        <p class="archive-description">{{ page.description }}</p>
      {% endif %}
    </header>
    <div class="archive-body">
      {{ content }}
    </div>
  </div>
</main>
