---
layout: default
---

<main class="main main--project">
  <article class="container project-page">
    <header class="project-page-header">
      <h1 class="project-page-title">{{ page.title }}</h1>
      {% if page.status %}
        <p class="project-page-meta">{{ page.date | date: "%Y-%m" }} · {{ page.status }}</p>
      {% endif %}
      {% if page.summary %}
        <p class="project-page-summary">{{ page.summary }}</p>
      {% endif %}
    </header>
    <div class="project-page-body">
      {{ content }}
    </div>
  </article>
</main>
